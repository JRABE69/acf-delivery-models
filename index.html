<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACF Delivery Models – Control vs Capability</title>
<style>
  :root{
    --bg:#ffffff;
    --text:#17202b;
    --muted:#667085;
    --a:#c97a12;
    --b:#9f5a0f;
    --c:#1f9c52;
    --d:#2557d6;
  }

  * { box-sizing: border-box; }

  body{
    margin:0;
    font-family: Inter, Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
  }

  .container{
    max-width:1100px;
    margin:0 auto;
    padding:18px 20px 20px;
  }

  svg{
    width:100%;
    height:auto;
    display:block;
  }

  .grid-line{
    stroke:#e7ebf1;
    stroke-width:1;
  }

  .axis-line{
    stroke:#98a2b3;
    stroke-width:1.5;
  }

  .axis-label{
    fill:var(--muted);
    font-size:15px;
    font-weight:700;
  }

  .axis-sub{
    fill:var(--muted);
    font-size:12px;
  }

  .quadrant-label{
    fill:#98a2b3;
    font-size:12px;
    font-weight:700;
  }

  .model-callout{
    fill:var(--text);
    font-size:12px;
    font-weight:700;
  }

  .node{
    cursor:pointer;
    transition:.2s ease;
  }

  .node circle{
    stroke:#fff;
    stroke-width:4;
    filter: drop-shadow(0 5px 10px rgba(0,0,0,.14));
  }

  .node text{
    fill:#fff;
    font-weight:800;
    font-size:16px;
    text-anchor:middle;
    dominant-baseline:middle;
    pointer-events:none;
  }

  .A circle{ fill:var(--a); }
  .B circle{ fill:var(--b); }
  .C circle{ fill:var(--c); }
  .D circle{ fill:var(--d); }

  .legend{
    display:flex;
    gap:16px;
    flex-wrap:wrap;
    justify-content:center;
    margin-top:8px;
    color:var(--muted);
    font-size:13px;
  }

  .legend-item{
    display:flex;
    align-items:center;
    gap:8px;
  }

  .swatch{
    width:12px;
    height:12px;
    border-radius:50%;
    display:inline-block;
  }

  .note{
    margin-top:10px;
    font-size:12px;
    color:var(--muted);
    line-height:1.5;
    text-align:center;
  }
</style>
</head>
<body>
<div class="container">

  <svg viewBox="0 0 920 620" aria-label="Delivery models chart">
    <line class="grid-line" x1="120" y1="120" x2="820" y2="120"></line>
    <line class="grid-line" x1="120" y1="240" x2="820" y2="240"></line>
    <line class="grid-line" x1="120" y1="360" x2="820" y2="360"></line>
    <line class="grid-line" x1="120" y1="480" x2="820" y2="480"></line>

    <line class="grid-line" x1="120" y1="480" x2="120" y2="120"></line>
    <line class="grid-line" x1="353" y1="480" x2="353" y2="120"></line>
    <line class="grid-line" x1="586" y1="480" x2="586" y2="120"></line>
    <line class="grid-line" x1="820" y1="480" x2="820" y2="120"></line>

    <line class="axis-line" x1="120" y1="480" x2="850" y2="480"></line>
    <line class="axis-line" x1="120" y1="480" x2="120" y2="90"></line>

    <text class="axis-label" x="470" y="560" text-anchor="middle">ACF capability</text>
    <text class="axis-sub" x="120" y="585" text-anchor="start">Lower</text>
    <text class="axis-sub" x="820" y="585" text-anchor="end">Higher</text>

    <text class="axis-label" x="36" y="300" text-anchor="middle" transform="rotate(-90 36 300)">ACF strategic control</text>
    <text class="axis-sub" x="54" y="478" text-anchor="middle">Lower</text>
    <text class="axis-sub" x="54" y="120" text-anchor="middle">Higher</text>

    <text class="quadrant-label" x="180" y="145">Externally driven</text>
    <text class="quadrant-label" x="635" y="145">ACF-led</text>
    <text class="quadrant-label" x="145" y="460">Earlier internal capability</text>
    <text class="quadrant-label" x="610" y="460">More developed capability</text>

    <g id="haloLayer"></g>

    <g class="node A" data-model="A" transform="translate(300,330)">
      <circle r="40"></circle>
      <text>A</text>
    </g>
    <text class="model-callout" x="300" y="385" text-anchor="middle">PM-led</text>

    <g class="node B" data-model="B" transform="translate(430,285)">
      <circle r="40"></circle>
      <text>B</text>
    </g>
    <text class="model-callout" x="430" y="340" text-anchor="middle">Engineering-led</text>

    <g class="node C" data-model="C" transform="translate(720,165)">
      <circle r="40"></circle>
      <text>C</text>
    </g>
    <text class="model-callout" x="720" y="220" text-anchor="middle">Full corporation</text>

    <g class="node D" data-model="D" transform="translate(645,215)">
      <circle r="40"></circle>
      <text>D</text>
    </g>
    <text class="model-callout" x="645" y="270" text-anchor="middle">Hybrid</text>
  </svg>

  <div class="legend">
    <div class="legend-item"><span class="swatch" style="background:#c97a12"></span> Model A</div>
    <div class="legend-item"><span class="swatch" style="background:#9f5a0f"></span> Model B</div>
    <div class="legend-item"><span class="swatch" style="background:#1f9c52"></span> Model C</div>
    <div class="legend-item"><span class="swatch" style="background:#2557d6"></span> Model D</div>
  </div>

  <div class="note">
    Hover over a model to reveal the relative weight of <strong>ACF</strong> (blue), <strong>Programme Management</strong> (amber), and <strong>Engineering</strong> (green).
  </div>

</div>

<script>
  const roleHalos = {
    A: { acf: 52, pm: 74, eng: 60 },
    B: { acf: 58, pm: 42, eng: 78 },
    C: { acf: 82, pm: 38, eng: 36 },
    D: { acf: 78, pm: 58, eng: 56 }
  };

  const modelPositions = {
    A: { x: 300, y: 330 },
    B: { x: 430, y: 285 },
    C: { x: 720, y: 165 },
    D: { x: 645, y: 215 }
  };

  function drawHalos(model) {
    const haloLayer = document.getElementById("haloLayer");
    haloLayer.innerHTML = "";
    if (!model) return;

    const pos = modelPositions[model];
    const halos = roleHalos[model];
    const values = [halos.acf, halos.pm, halos.eng];
    const max = Math.max(...values);
    const min = Math.min(...values);

    function opacityFor(value){
      if (max === min) return 0.18;
      const t = (value - min) / (max - min);
      return 0.04 + t * 0.28;
    }

    const haloData = [
      { r: halos.acf, fill: `rgba(37,87,214,${opacityFor(halos.acf)})` },
      { r: halos.pm,  fill: `rgba(201,122,18,${opacityFor(halos.pm)})` },
      { r: halos.eng, fill: `rgba(31,156,82,${opacityFor(halos.eng)})` }
    ];

    haloData
      .sort((a, b) => b.r - a.r)
      .forEach(h => {
        const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        c.setAttribute("cx", pos.x);
        c.setAttribute("cy", pos.y);
        c.setAttribute("r", h.r);
        c.setAttribute("fill", h.fill);
        haloLayer.appendChild(c);
      });
  }

  function clearHalos() {
    document.getElementById("haloLayer").innerHTML = "";
  }

  document.querySelectorAll(".node").forEach(node => {
    node.addEventListener("mouseenter", () => {
      drawHalos(node.getAttribute("data-model"));
    });
    node.addEventListener("mouseleave", clearHalos);
  });
</script>
</body>
</html>
