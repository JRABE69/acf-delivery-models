<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACF Delivery Models – Control vs Capability</title>
<style>
  :root{
    --bg:#ffffff;
    --text:#17202b;
    --muted:#667085;
    --a:#c97a12;
    --b:#9f5a0f;
    --c:#1f9c52;
    --d:#2557d6;
    --legend-active:#17202b;
    --legend-inactive:#98a2b3;
  }

  * { box-sizing: border-box; }

  body{
    margin:0;
    font-family: Inter, Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
  }

  .container{
    max-width:1100px;
    margin:0 auto;
    padding:18px 20px 20px;
  }

  svg{
    width:100%;
    height:auto;
    display:block;
  }

  .grid-line{
    stroke:#e7ebf1;
    stroke-width:1;
  }

  .axis-line{
    stroke:#98a2b3;
    stroke-width:1.5;
  }

  .axis-label{
    fill:var(--muted);
    font-size:15px;
    font-weight:700;
  }

  .axis-sub{
    fill:var(--muted);
    font-size:12px;
  }

  .node{
    cursor:pointer;
    transition:.2s ease;
  }

  .node circle{
    stroke:#fff;
    stroke-width:4;
    filter: drop-shadow(0 5px 10px rgba(0,0,0,.14));
  }

  .node text{
    fill:#fff;
    font-weight:800;
    font-size:16px;
    text-anchor:middle;
    dominant-baseline:middle;
    pointer-events:none;
  }

  .A circle{ fill:var(--a); }
  .B circle{ fill:var(--b); }
  .C circle{ fill:var(--c); }
  .D circle{ fill:var(--d); }

  .legend{
    display:flex;
    gap:18px;
    flex-wrap:wrap;
    justify-content:center;
    margin-top:10px;
    font-size:13px;
  }

  .legend-item{
    display:flex;
    align-items:center;
    gap:8px;
    color:var(--legend-inactive);
    transition:.15s ease;
    font-weight:600;
  }

  .legend-item.active{
    color:var(--legend-active);
  }

  .swatch{
    width:12px;
    height:12px;
    border-radius:50%;
    display:inline-block;
  }

  .note{
    margin-top:10px;
    font-size:12px;
    color:var(--muted);
    line-height:1.5;
    text-align:center;
  }
</style>
</head>
<body>
<div class="container">

  <svg viewBox="0 0 920 620" aria-label="Delivery models chart">
    <line class="grid-line" x1="120" y1="120" x2="820" y2="120"></line>
    <line class="grid-line" x1="120" y1="240" x2="820" y2="240"></line>
    <line class="grid-line" x1="120" y1="360" x2="820" y2="360"></line>
    <line class="grid-line" x1="120" y1="480" x2="820" y2="480"></line>

    <line class="grid-line" x1="120" y1="480" x2="120" y2="120"></line>
    <line class="grid-line" x1="353" y1="480" x2="353" y2="120"></line>
    <line class="grid-line" x1="586" y1="480" x2="586" y2="120"></line>
    <line class="grid-line" x1="820" y1="480" x2="820" y2="120"></line>

    <line class="axis-line" x1="120" y1="480" x2="850" y2="480"></line>
    <line class="axis-line" x1="120" y1="480" x2="120" y2="90"></line>

    <text class="axis-label" x="470" y="560" text-anchor="middle">ACF capability</text>
    <text class="axis-sub" x="120" y="585" text-anchor="start">Lower</text>
    <text class="axis-sub" x="820" y="585" text-anchor="end">Higher</text>

    <text class="axis-label" x="36" y="300" text-anchor="middle" transform="rotate(-90 36 300)">ACF strategic control</text>
    <text class="axis-sub" x="54" y="478" text-anchor="middle">Lower</text>
    <text class="axis-sub" x="54" y="120" text-anchor="middle">Higher</text>

    <g id="haloLayer"></g>
    <g id="haloTextLayer"></g>

    <g class="node A" data-model="A" transform="translate(300,330)">
      <circle r="40"></circle>
      <text>A</text>
    </g>

    <g class="node B" data-model="B" transform="translate(430,285)">
      <circle r="40"></circle>
      <text>B</text>
    </g>

    <g class="node C" data-model="C" transform="translate(720,165)">
      <circle r="40"></circle>
      <text>C</text>
    </g>

    <g class="node D" data-model="D" transform="translate(645,215)">
      <circle r="40"></circle>
      <text>D</text>
    </g>
  </svg>

  <div class="legend">
    <div class="legend-item" id="legend-A"><span class="swatch" style="background:#c97a12"></span> Model A – Programme Management Consultant</div>
    <div class="legend-item" id="legend-B"><span class="swatch" style="background:#9f5a0f"></span> Model B – Engineering Integrator</div>
    <div class="legend-item" id="legend-C"><span class="swatch" style="background:#1f9c52"></span> Model C – Development Corporation</div>
    <div class="legend-item" id="legend-D"><span class="swatch" style="background:#2557d6"></span> Model D – Hybrid Model</div>
  </div>

  <div class="note">
    Hover over a model to reveal the relative weight of <strong>ACF</strong> (blue), <strong>Programme Management</strong> (amber), and <strong>Engineering</strong> (green).
  </div>

</div>

<script>
  const roleHalos = {
    A: { acf: 52, pm: 74, eng: 60, label: "PM-led" },
    B: { acf: 58, pm: 42, eng: 78, label: "Engineering-led" },
    C: { acf: 82, pm: 38, eng: 36, label: "ACF-led" },
    D: { acf: 78, pm: 58, eng: 56, label: "ACF-led" }
  };

  const modelPositions = {
    A: { x: 300, y: 330 },
    B: { x: 430, y: 285 },
    C: { x: 720, y: 165 },
    D: { x: 645, y: 215 }
  };

  function setLegendActive(model) {
    document.querySelectorAll(".legend-item").forEach(el => el.classList.remove("active"));
    const el = document.getElementById(`legend-${model}`);
    if (el) el.classList.add("active");
  }

  function clearLegendActive() {
    document.querySelectorAll(".legend-item").forEach(el => el.classList.remove("active"));
  }

  function drawHalos(model) {
    const haloLayer = document.getElementById("haloLayer");
    const haloTextLayer = document.getElementById("haloTextLayer");
    haloLayer.innerHTML = "";
    haloTextLayer.innerHTML = "";
    if (!model) return;

    const pos = modelPositions[model];
    const halos = roleHalos[model];
    const values = [halos.acf, halos.pm, halos.eng];
    const max = Math.max(...values);
    const min = Math.min(...values);

    function opacityFor(value){
      if (max === min) return 0.18;
      const t = (value - min) / (max - min);
      return 0.04 + t * 0.28;
    }

    const haloData = [
      { key: "acf", r: halos.acf, fill: `rgba(37,87,214,${opacityFor(halos.acf)})` },
      { key: "pm",  r: halos.pm,  fill: `rgba(201,122,18,${opacityFor(halos.pm)})` },
      { key: "eng", r: halos.eng, fill: `rgba(31,156,82,${opacityFor(halos.eng)})` }
    ];

    haloData.sort((a, b) => b.r - a.r);

    haloData.forEach(h => {
      const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      c.setAttribute("cx", pos.x);
      c.setAttribute("cy", pos.y);
      c.setAttribute("r", h.r);
      c.setAttribute("fill", h.fill);
      haloLayer.appendChild(c);
    });

    const outer = haloData[0];

    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
    text.setAttribute("x", pos.x);
    text.setAttribute("y", pos.y + outer.r - 10);
    text.setAttribute("text-anchor", "middle");
    text.setAttribute("dominant-baseline", "middle");
    text.setAttribute("fill", "rgba(23,32,43,0.42)");
    text.setAttribute("font-size", "11");
    text.setAttribute("font-weight", "600");
    text.setAttribute("letter-spacing", "0.2");
    text.textContent = halos.label;

    haloTextLayer.appendChild(text);
  }

  function clearHalos() {
    document.getElementById("haloLayer").innerHTML = "";
    document.getElementById("haloTextLayer").innerHTML = "";
  }

  document.querySelectorAll(".node").forEach(node => {
    node.addEventListener("mouseenter", () => {
      const model = node.getAttribute("data-model");
      drawHalos(model);
      setLegendActive(model);
    });
    node.addEventListener("mouseleave", () => {
      clearHalos();
      clearLegendActive();
    });
  });
</script>
</body>
</html>
