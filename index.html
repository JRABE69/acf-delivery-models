<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivery Models — Control vs Capability</title>
<style>
  :root{
    --bg:#ffffff;
    --text:#17202b;
    --muted:#667085;
    --a:#c97a12;
    --b:#9f5a0f;
    --c:#1f9c52;
    --d:#2557d6;
    --legend-active:#17202b;
    --legend-inactive:#98a2b3;
  }

  body{
    margin:0;
    font-family: Inter, Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
  }

  .container{
    max-width:980px;
    margin:0 auto;
    padding:6px 10px 6px;
  }

  svg{
    width:100%;
    height:auto;
    display:block;
  }

  .grid-line{
    stroke:#eef1f5;
    stroke-width:1;
  }

  .axis-line{
    stroke:#98a2b3;
    stroke-width:1.4;
  }

  .axis-label{
    fill:var(--muted);
    font-size:13px;
    font-weight:700;
  }

  .axis-sub{
    fill:var(--muted);
    font-size:10px;
  }

  .node circle{
    stroke:#fff;
    stroke-width:3;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,.12));
  }

  .node text{
    fill:#fff;
    font-weight:700;
    font-size:14px;
    text-anchor:middle;
    dominant-baseline:middle;
  }

  .A circle{ fill:var(--a); }
  .B circle{ fill:var(--b); }
  .C circle{ fill:var(--c); }
  .D circle{ fill:var(--d); }

  .legend{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    justify-content:center;
    margin-top:4px;
    font-size:12px;
  }

  .legend-item{
    display:flex;
    align-items:center;
    gap:6px;
    color:var(--legend-inactive);
    font-weight:500;
  }

  .legend-item.active{
    color:var(--legend-active);
  }

  .swatch{
    width:10px;
    height:10px;
    border-radius:50%;
  }

  .note{
    margin-top:4px;
    font-size:10px;
    color:var(--muted);
    text-align:center;
  }
</style>
</head>
<body>
<div class="container">

  <svg viewBox="60 80 780 440">

    <!-- grid -->
    <line class="grid-line" x1="120" y1="120" x2="780" y2="120"/>
    <line class="grid-line" x1="120" y1="240" x2="780" y2="240"/>
    <line class="grid-line" x1="120" y1="360" x2="780" y2="360"/>
    <line class="grid-line" x1="120" y1="480" x2="780" y2="480"/>

    <line class="grid-line" x1="120" y1="480" x2="120" y2="120"/>
    <line class="grid-line" x1="350" y1="480" x2="350" y2="120"/>
    <line class="grid-line" x1="580" y1="480" x2="580" y2="120"/>
    <line class="grid-line" x1="780" y1="480" x2="780" y2="120"/>

    <!-- axes -->
    <line class="axis-line" x1="120" y1="480" x2="820" y2="480"/>
    <line class="axis-line" x1="120" y1="480" x2="120" y2="100"/>

    <!-- labels -->
    <text class="axis-label" x="460" y="520" text-anchor="middle">ACF capability</text>
    <text class="axis-label" x="20" y="300" transform="rotate(-90 20 300)">ACF control</text>

    <!-- halos -->
    <g id="haloLayer"></g>
    <g id="haloTextLayer"></g>

    <!-- nodes -->
    <g class="node A" data-model="A" transform="translate(300,330)">
      <circle r="30"></circle><text>A</text>
    </g>

    <g class="node B" data-model="B" transform="translate(430,285)">
      <circle r="30"></circle><text>B</text>
    </g>

    <g class="node C" data-model="C" transform="translate(700,165)">
      <circle r="30"></circle><text>C</text>
    </g>

    <g class="node D" data-model="D" transform="translate(620,215)">
      <circle r="30"></circle><text>D</text>
    </g>

  </svg>

  <div class="legend">
    <div class="legend-item" id="legend-A"><span class="swatch" style="background:#c97a12"></span> A – PM Model</div>
    <div class="legend-item" id="legend-B"><span class="swatch" style="background:#9f5a0f"></span> B – Engineering Model</div>
    <div class="legend-item" id="legend-C"><span class="swatch" style="background:#1f9c52"></span> C – Corporation</div>
    <div class="legend-item" id="legend-D"><span class="swatch" style="background:#2557d6"></span> D – Hybrid</div>
  </div>

</div>

<script>
  const roleHalos = {
    A: { acf: 45, pm: 70, eng: 55, label: "PM-led" },
    B: { acf: 50, pm: 40, eng: 75, label: "Engineering-led" },
    C: { acf: 80, pm: 35, eng: 30, label: "ACF-led" },
    D: { acf: 75, pm: 55, eng: 50, label: "ACF-led" }
  };

  const modelPositions = {
    A: { x: 300, y: 330 },
    B: { x: 430, y: 285 },
    C: { x: 700, y: 165 },
    D: { x: 620, y: 215 }
  };

  function drawHalos(model) {
    const haloLayer = document.getElementById("haloLayer");
    const textLayer = document.getElementById("haloTextLayer");
    haloLayer.innerHTML = "";
    textLayer.innerHTML = "";

    const pos = modelPositions[model];
    const h = roleHalos[model];
    const values = [h.acf, h.pm, h.eng];
    const max = Math.max(...values);
    const min = Math.min(...values);

    const opacity = v => 0.05 + ((v - min)/(max-min||1))*0.3;

    [
      {r:h.acf, c:`rgba(37,87,214,${opacity(h.acf)})`},
      {r:h.pm,  c:`rgba(201,122,18,${opacity(h.pm)})`},
      {r:h.eng, c:`rgba(31,156,82,${opacity(h.eng)})`}
    ]
    .sort((a,b)=>b.r-a.r)
    .forEach(o=>{
      const el = document.createElementNS("http://www.w3.org/2000/svg","circle");
      el.setAttribute("cx",pos.x);
      el.setAttribute("cy",pos.y);
      el.setAttribute("r",o.r);
      el.setAttribute("fill",o.c);
      haloLayer.appendChild(el);
    });

    const outer = Math.max(h.acf,h.pm,h.eng);

    const t = document.createElementNS("http://www.w3.org/2000/svg","text");
    t.setAttribute("x",pos.x);
    t.setAttribute("y",pos.y + outer - 6);
    t.setAttribute("text-anchor","middle");
    t.setAttribute("font-size","10");
    t.setAttribute("fill","rgba(0,0,0,0.45)");
    t.textContent = h.label;
    textLayer.appendChild(t);
  }

  function clearHalos(){
    document.getElementById("haloLayer").innerHTML="";
    document.getElementById("haloTextLayer").innerHTML="";
  }

  document.querySelectorAll(".node").forEach(n=>{
    n.addEventListener("mouseenter",()=>drawHalos(n.dataset.model));
    n.addEventListener("mouseleave",clearHalos);
  });
</script>

</body>
</html>
